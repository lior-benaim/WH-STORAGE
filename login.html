<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>כניסה — מחסן ADDICT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0C0C0C;color:#EAE5D8;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.card{
  background:#1E1E1E;border:1px solid #2C2C2C;border-radius:14px;
  padding:32px 28px;max-width:360px;width:100%;
}
.logo{font-size:28px;font-weight:900;color:#F0C419;text-align:center;margin-bottom:4px}
.sub{font-size:13px;color:#888;text-align:center;margin-bottom:24px}
.fg{margin-bottom:14px}
label{font-size:11px;color:#888;font-weight:700;margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.5px}
input{
  width:100%;background:#161616;border:1px solid #2C2C2C;border-radius:8px;
  padding:11px 13px;color:#EAE5D8;font-size:15px;outline:none;transition:border-color .15s;
}
input:focus{border-color:#F0C419}
button{
  width:100%;background:#F0C419;color:#111;border:none;border-radius:8px;
  padding:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:filter .15s;
}
button:hover{filter:brightness(1.08)}
button:disabled{opacity:.5;cursor:not-allowed}
.error{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#EF4444;
  border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:14px;display:none;text-align:center;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📦 ADDICT</div>
  <div class="sub">מערכת ניהול מחסן</div>
  <div class="error" id="error"></div>
  <form id="loginForm">
    <div class="fg">
      <label>שם משתמש</label>
      <input type="text" id="username" autocomplete="username" required>
    </div>
    <div class="fg">
      <label>סיסמה</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" id="submitBtn">כניסה</button>
  </form>
</div>

<script>
const form = document.getElementById('loginForm');
const errorEl = document.getElementById('error');
const btn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'מתחבר...';

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      window.location.href = '/app.html';
    } else {
      errorEl.textContent = data.error || 'שגיאה בהתחברות';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'כניסה';
    }
  } catch (err) {
    errorEl.textContent = 'שגיאת רשת — נסי שוב';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'כניסה';
  }
});
</script>
</body>
</html>
